<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout | Algomart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
    }
    .checkout-container {
      max-width: 700px;
      margin: auto;
      padding-top: 40px;
    }
    .product-img {
      width: 80px;
      height: 80px;
      object-fit: contain;
    }
    #success-animation {
      display: none;
      text-align: center;
      margin-top: 30px;
    }
    .checkmark {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      display: inline-block;
      border: 6px solid #28a745;
      position: relative;
      animation: pop 0.4s ease-out;
    }
    .checkmark::after {
      content: '';
      position: absolute;
      left: 28px;
      top: 50px;
      width: 25px;
      height: 50px;
      border-right: 6px solid white;
      border-bottom: 6px solid white;
      transform: rotate(45deg);
      animation: draw 0.4s ease-out 0.2s forwards;
      opacity: 0;
    }
    @keyframes draw {
      to {
        opacity: 1;
      }
    }
    @keyframes pop {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

<div class="container checkout-container">
  <h2 class="mb-4 text-center">🧾 Checkout Summary</h2>
  <div id="checkout-summary"></div>

  <div class="mb-4">
    <label for="payment" class="form-label fw-bold">Choose Payment Method:</label>
    <select class="form-select" id="payment">
      <option value="cash">Cash on Delivery</option>
      <option value="card">Credit/Debit Card</option>
    </select>
  </div>

  <div class="text-center">
    <button class="btn btn-success" onclick="placeOrder()">Place Order</button>
    <a href="cart.html" class="btn btn-outline-secondary ms-2">← Back to Cart</a>
  </div>

  <!-- Success Animation -->
  <div id="success-animation">
    <div class="checkmark bg-success">
    </div>
    <h3 class="mt-3 text-success">Order Placed Successfully!</h3>
  </div>
</div>

<script>
function getCart() {
  return JSON.parse(localStorage.getItem("cart") || "[]");
}

function calculateTotal(cart) {
  let total = 0;
  cart.forEach(item => total += item.price * item.qty);
  return total;
}

function getDiscount(total) {
  if (total >= 500 && total < 999) return total * 0.10;
  if (total >= 999) return total * 0.20;
  return 0;
}

function renderCheckout() {
  const cart = getCart();
  const container = document.getElementById("checkout-summary");

  if (cart.length === 0) {
    container.innerHTML = `<div class="alert alert-info text-center">Your cart is empty.</div>`;
    return;
  }

  let html = '<ul class="list-group mb-3">';
  cart.forEach(item => {
    html += `
      <li class="list-group-item d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
          <img src="${item.img}" class="product-img me-3" alt="${item.name}">
          <div>
            <h6 class="mb-0">${item.name}</h6>
            <small>₹${item.price} × ${item.qty}</small>
          </div>
        </div>
        <span>₹${item.price * item.qty}</span>
      </li>`;
  });
  html += '</ul>';

  const total = calculateTotal(cart);
  const discount = getDiscount(total);
  const final = total - discount;

  html += `
    <div class="text-end fw-bold">
      <p>Total: ₹${total.toFixed(2)}</p>
      <p>Discount: ₹${discount.toFixed(2)}</p>
      <p class="fs-5">Final Price: ₹${final.toFixed(2)}</p>
    </div>
  `;

  container.innerHTML = html;
}

function placeOrder() {
  const paymentMethod = document.getElementById("payment").value;
  const cart = getCart();
  const total = calculateTotal(cart);
  const discount = getDiscount(total);
  const final = total - discount;

  if (!paymentMethod) {
    alert("Please select a payment method.");
    return;
  }

  // Save order
  const orders = JSON.parse(localStorage.getItem("orders") || "[]");
  orders.push({
    date: new Date().toISOString(),
    items: cart,
    total,
    discount,
    final
  });
  localStorage.setItem("orders", JSON.stringify(orders));

  // Show animation
  document.getElementById("success-animation").style.display = "block";

  // Clear cart and redirect
  setTimeout(() => {
    localStorage.removeItem("cart");
    setTimeout(() => {
      window.location.href = "orders.html";
    }, 2000);
  }, 1500);
}

renderCheckout();
</script>

</body>
</html>
