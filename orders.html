<div class="container my-5">
  <h2 class="text-center mb-4">📦 Your Orders</h2>
  <div id="order-list"></div>
</div>
<div class="container my-5">
  <h4 class="text-center mb-4">🗑 Cancelled Orders</h4>
  <div id="cancelled-order-list"></div>
</div>


<script>
function loadOrders() {
  const orders = JSON.parse(localStorage.getItem("orders") || "[]");
  const container = document.getElementById("order-list");
  container.innerHTML = "";

  if (orders.length === 0) {
    container.innerHTML = '<div class="alert alert-info text-center">No active orders.</div>';
    return;
  }

  orders.forEach((order, idx) => {
    const orderCard = document.createElement("div");
    orderCard.className = "card mb-4 shadow-sm";
    orderCard.id = `order-${idx}`;

    orderCard.innerHTML = `
      <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
        <strong>Order #${idx + 1}</strong>
        <span>${new Date(order.date).toLocaleString()}</span>
      </div>
      <ul class="list-group list-group-flush">
        ${order.items.map(item => `
          <li class="list-group-item d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center">
              <img src="${item.img}" class="product-img me-3" alt="${item.name}">
              <div>
                <div class="fw-bold">${item.name}</div>
                <div>Qty: ${item.qty} × ₹${item.price}</div>
              </div>
            </div>
            <div class="fw-bold text-end">₹${item.qty * item.price}</div>
          </li>
        `).join("")}
        <li class="list-group-item text-end">
          <strong>Total: ₹${order.total.toFixed(2)}</strong><br>
          <small>Discount: ₹${order.discount.toFixed(2)}</small><br>
          <span class="text-success fw-bold">Final: ₹${order.final.toFixed(2)}</span>
        </li>
        <li class="list-group-item text-end">
          <button class="btn btn-danger btn-sm" onclick="cancelOrder(${idx})">Cancel Order</button>
        </li>
      </ul>
    `;

    container.appendChild(orderCard);
  });
}

function cancelOrder(index) {
  const orders = JSON.parse(localStorage.getItem("orders") || "[]");
  const cancelledOrders = JSON.parse(localStorage.getItem("cancelledOrders") || "[]");

  const cancelled = orders.splice(index, 1)[0];
  localStorage.setItem("orders", JSON.stringify(orders));
  localStorage.setItem("cancelledOrders", JSON.stringify([cancelled, ...cancelledOrders]));
  loadOrders();
  loadCancelledOrders();

  showUndoToast(cancelled);
}

function showUndoToast(order) {
  const toast = document.createElement("div");
  toast.className = "toast align-items-center text-white bg-danger border-0 show position-fixed bottom-0 end-0 m-4";
  toast.role = "alert";
  toast.style.zIndex = "1055";

  toast.innerHTML = `
    <div class="d-flex">
      <div class="toast-body">
        Order cancelled! <button class="btn btn-sm btn-light ms-2">Undo</button>
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
  `;

  const undoBtn = toast.querySelector("button.btn-light");
  let undoTimeout = setTimeout(() => {
    toast.remove();
  }, 5000);

  undoBtn.addEventListener("click", () => {
    clearTimeout(undoTimeout);
    restoreOrder(order);
    toast.remove();
  });

  document.body.appendChild(toast);
}

function restoreOrder(order) {
  const orders = JSON.parse(localStorage.getItem("orders") || "[]");
  const cancelledOrders = JSON.parse(localStorage.getItem("cancelledOrders") || "[]");

  const updatedCancelled = cancelledOrders.filter(o => o.date !== order.date);
  localStorage.setItem("orders", JSON.stringify([order, ...orders]));
  localStorage.setItem("cancelledOrders", JSON.stringify(updatedCancelled));
  loadOrders();
  loadCancelledOrders();
}
function removeCancelledOrder(index) {
  let cancelled = JSON.parse(localStorage.getItem("cancelledOrders") || "[]");
  cancelled.splice(index, 1);
  localStorage.setItem("cancelledOrders", JSON.stringify(cancelled));
  loadCancelledOrders();
}


function loadCancelledOrders() {
  const cancelled = JSON.parse(localStorage.getItem("cancelledOrders") || "[]");
  const container = document.getElementById("cancelled-order-list");
  container.innerHTML = "";

  if (cancelled.length === 0) {
    container.innerHTML = '<div class="alert alert-secondary text-center">No cancelled orders.</div>';
    return;
  }

  cancelled.forEach((order, idx) => {
    const orderCard = document.createElement("div");
    orderCard.className = "card mb-4 border-danger";

    orderCard.innerHTML = `
      <div class="card-header bg-danger text-white">
        <strong>Cancelled Order</strong> • ${new Date(order.date).toLocaleString()}
      </div>
      <ul class="list-group list-group-flush">
        ${order.items.map(item => `
          <li class="list-group-item d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center">
              <img src="${item.img}" class="product-img me-3" alt="${item.name}">
              <div>
                <div class="fw-bold">${item.name}</div>
                <div>Qty: ${item.qty} × ₹${item.price}</div>
              </div>
            </div>
            <div class="fw-bold">₹${item.qty * item.price}</div>
          </li>
        `).join("")}
        <li class="list-group-item text-end text-danger fw-bold">
          Final Price: ₹${order.final.toFixed(2)} (Cancelled)
        </li>
        <li class="list-group-item text-end">
          <button class="btn btn-outline-danger btn-sm" onclick="removeCancelledOrder(${idx})">
            Remove
          </button>
        </li>
      </ul>
    `;
    container.appendChild(orderCard);
  });
}

loadOrders();
loadCancelledOrders();
</script>
